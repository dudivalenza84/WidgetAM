<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeuDimDim Media Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="widget-container" id="widget">
    <!-- Capa do Álbum -->
    <div class="album-art-container">
      <img id="album-art" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23222'/><path d='M30 30h40v40H30z' fill='%23444'/><circle cx='50' cy='50' r='10' fill='%23666'/></svg>" alt="Capa do Álbum">
    </div>

    <!-- Informações e Controles -->
    <div class="media-details">
      <div class="track-info">
        <h1 id="track-title">Sem reprodução</h1>
        <h2 id="track-artist">Abra o Amazon Music no Chrome</h2>
      </div>

      <!-- Barra de Progresso -->
      <div class="progress-container">
        <span class="time-label" id="current-time">0:00</span>
        <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
        <span class="time-label" id="total-duration">0:00</span>
      </div>

      <!-- Fileira de Controles -->
      <div class="controls-row">
        <div class="playback-buttons">
          <button id="prev-btn" title="Anterior" aria-label="Anterior">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 18V6z"/></svg>
          </button>
          <button id="play-pause-btn" title="Reproduzir / Pausar" aria-label="Reproduzir / Pausar">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" class="hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button id="next-btn" title="Próxima" aria-label="Próxima">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
          </button>
        </div>

        <!-- Controle de Volume -->
        <div class="volume-container">
          <button id="mute-btn" title="Mudar Volume" aria-label="Mudar Volume">
            <svg id="volume-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          </button>
          <input type="range" id="volume-bar" min="0" max="100" value="50">
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
